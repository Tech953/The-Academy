kind = "mobile"
previewPath = "/academy-mobile/"
title = "The Academy (Mobile)"
version = "1.0.0"
id = "artifacts/academy-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/academy-mobile/" ]
localPort = 20877

[services.development]
run = "pnpm --filter @workspace/academy-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/academy-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/academy-mobile", "run", "serve" ]

[services.env]
PORT = "20877"
BASE_PATH = "/academy-mobile/"
